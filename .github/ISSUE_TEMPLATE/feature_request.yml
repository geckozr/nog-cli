name: Feature Request
description: Suggest an idea or improvement
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like?
      description: Describe the feature or improvement
      placeholder: I'd like nog-cli to...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why do you need it?
      description: What problem does this solve for you?
      placeholder: Currently I have to...
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: Ideas on how to implement it (optional)
      description: If you have thoughts on the implementation, share them here
      placeholder: |
        It could work like...
        ```typescript
        // Example usage
        ```

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
