name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead
      placeholder: |
        When I run `nog-cli generate spec.json`, I get...
        I expected...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Steps, command, or minimal OpenAPI snippet to reproduce the issue
      placeholder: |
        1. Run `nog-cli generate ...`
        2. ...

        Or paste a minimal OpenAPI snippet:
        ```yaml
        paths:
          /users:
            get: ...
        ```
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output (optional)
      description: Paste relevant error messages or CLI output
      render: bash

  - type: input
    id: version
    attributes:
      label: nog-cli version
      description: Run `nog-cli --version`
      placeholder: e.g., 0.10.9
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version and OS
      placeholder: e.g., Node 20.11.0, Linux

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
